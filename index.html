<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Купить Звезду | Официальный звездный каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0b111e 0%, #020306 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            overflow: hidden; /* Скрываем полосы прокрутки из-за анимации фона */
            perspective: 1000px; /* Включаем 3D-пространство */
            position: relative;
        }

        /* --- ПЛАВАЮЩИЙ КОСМИЧЕСКИЙ ФОН --- */
        
        /* Слой 1: Мелкие далекие звезды */
        .space-bg-1 {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: transparent url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1000') repeat;
            opacity: 0.15;
            z-index: -2;
            animation: driftClockwise 40s linear infinite; /* Плавное круговое движение */
        }

        /* Слой 2: Крупные более близкие звезды */
        .space-bg-2 {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: transparent url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=1000') repeat;
            opacity: 0.08;
            z-index: -1;
            mix-blend-mode: color-dodge;
            animation: driftCounterClockwise 60s linear infinite; /* Движение в другую сторону для глубины */
        }

        /* Анимации для плавающего космоса */
        @keyframes driftClockwise {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(40px, -30px) rotate(3deg) scale(1.05); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        }

        @keyframes driftCounterClockwise {
            0% { transform: translate(0, 0) rotate(0deg) scale(1.1); }
            50% { transform: translate(-30px, 40px) rotate(-3deg) scale(1); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1.1); }
        }

        /* ---------------------------------- */

        /* Главная 3D Карта-Контейнер */
        .card-3d {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            padding: 45px 35px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
            z-index: 10;
            
            /* Эффект глубокой трехмерной тени и парения */
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                inset 0 -1px 0 rgba(0, 0, 0, 0.4);
            
            /* Стартовый эффект 3D наклона */
            transform: rotateX(6deg) rotateY(-4deg);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease;
            transform-style: preserve-3d;
        }

        /* При наведении карточка слегка реагирует */
        .card-3d:hover {
            box-shadow: 
                0 40px 80px rgba(99, 102, 241, 0.25),
                0 0 40px rgba(255, 0, 127, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        /* Объёмная парящая аватарка */
        .avatar-3d {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff007f 0%, #7f00ff 100%);
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            
            /* Выдавливание объекта вперед в 3D пространство */
            transform: translateZ(40px);
            box-shadow: 
                0 15px 30px rgba(127, 0, 255, 0.5),
                0 0 50px rgba(255, 0, 127, 0.3);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateZ(40px) translateY(0px); }
            50% { transform: translateZ(45px) translateY(-8px); }
        }

        h1 {
            font-size: 26px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 30%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(30px); /* Текст выпирает вперед */
        }

        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 35px;
            transform: translateZ(25px);
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #818cf8;
            margin-bottom: 18px;
            font-weight: 700;
            transform: translateZ(20px);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 35px;
            transform: translateZ(20px);
        }

        /* Общие 3D-кнопки */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            text-decoration: none;
            color: white;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 3D Главная кнопка заказа */
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            box-shadow: 
                0 6px 20px rgba(99, 102, 241, 0.4),
                0 3px 0 #3b1fb0; /* Имитация нижней грани кнопки */
            transform: translateZ(15px);
        }

        .btn-primary:hover {
            transform: translateZ(25px) translateY(-3px);
            box-shadow: 
                0 12px 28px rgba(99, 102, 241, 0.6),
                0 5px 0 #3b1fb0;
        }

        .btn-primary:active {
            transform: translateZ(10px) translateY(1px);
            box-shadow: 0 3px 10px rgba(99, 102, 241, 0.4);
        }

        /* 3D Социальная кнопка TikTok */
        .btn-tiktok {
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transform: translateZ(15px);
        }

        .btn-tiktok:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateZ(25px) translateY(-2px);
            border-color: rgba(0, 242, 234, 0.5);
            box-shadow: 
                -3px -3px 0 rgba(255, 0, 80, 0.5), 
                3px 3px 0 rgba(0, 242, 234, 0.5),
                0 10px 20px rgba(0, 0, 0, 0.3); /* Фирменный глитч-эффект TikTok */
        }

        .footer {
            font-size: 12px;
            color: #475569;
            margin-top: 15px;
            transform: translateZ(10px);
        }
        
        /* Мягкое свечение внутри карточки */
        .glow {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background: radial-gradient(circle at 50% 10%, rgba(124, 58, 237, 0.15) 0%, transparent 60%);
            pointer-events: none;
            border-radius: 30px;
        }
    </style>
</head>
<body>

    <!-- Подключаем два слоя плавающего космоса -->
    <div class="space-bg-1"></div>
    <div class="space-bg-2"></div>

    <!-- Интерактивная 3D карточка -->
    <div class="card-3d" id="card">
        <div class="glow"></div>
        
        <!-- Парящая аватарка -->
        <div class="avatar-3d">✨</div>
        
        <!-- Имя/Никнейм -->
        <h1>sqwizyslab</h1>
        <p class="subtitle">Официальная продажа и моментальная регистрация звёзд в космическом пространстве 🌌</p>
        
        <!-- Блок заказа -->
        <div class="section-title">Купить звезду</div>
        <div class="links-container">
            <a href="https://t.me/sqwizyslab" target="_blank" class="btn btn-primary">⭐ Оформить заказ (Telegram)</a>
        </div>

        <!-- Блок соцсетей -->
        <div class="section-title">Мои соцсети</div>
        <div class="links-container">
            <a href="https://tiktok.com/@sqwizyslab" target="_blank" class="btn btn-tiktok">🎵 TikTok (@sqwizyslab)</a>
        </div>

        <div class="footer">
            © 2026 sqwizyslab. Подари частичку вселенной.
        </div>
    </div>

    <!-- Скрипт для динамического 3D наклона за курсором мыши -->
    <script>
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${-xAxis}deg) rotateX(${yAxis}deg)`;
        });
        
        // Возвращаем в исходное положение, когда мышь уходит с экрана
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateX(6deg) rotateY(-4deg)`;
            card.style.transition = "transform 0.5s ease";
        });
        
        document.addEventListener('mouseenter', () => {
            card.style.transition = "none";
        });
    </script>

</body>
</html>
